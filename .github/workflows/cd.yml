name: CD pipeline

on:
  workflow_run:
    workflows: ["CI pipeline"]
    types: [completed]
    branches: [main]

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: [self-hosted, linux, x64]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure CLI and Helm
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q curl apt-transport-https lsb-release gnupg
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Azure login
        run: |
          az login --service-principal \
            --username ${{ secrets.AZURE_CLIENT_ID }} \
            --password ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-devops-lab \
            --name aks-devops-lab \
            --overwrite-existing

      - name: Deploy to dev
        run: |
          helm upgrade --install my-app ./chart \
            -f chart/values.yaml \
            -f deploy/dev/values.yaml \
            --set image.tag=${{ github.event.workflow_run.head_sha }} \
            --namespace my-app-dev \
            --create-namespace \
            --wait --timeout 5m

      - name: Verify
        run: |
          kubectl rollout status deployment/my-app -n my-app-dev
          kubectl get pods -n my-app-dev

  deploy-prod:
    name: Deploy to prod
    runs-on: [self-hosted, linux, x64]
    needs: deploy-dev
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure CLI and Helm
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q curl apt-transport-https lsb-release gnupg
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Azure login
        run: |
          az login --service-principal \
            --username ${{ secrets.AZURE_CLIENT_ID }} \
            --password ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-devops-lab \
            --name aks-devops-lab \
            --overwrite-existing

      - name: Deploy to prod
        run: |
          helm upgrade --install my-app ./chart \
            -f chart/values.yaml \
            -f deploy/prod/values.yaml \
            --set image.tag=${{ github.event.workflow_run.head_sha }} \
            --namespace my-app-prod \
            --create-namespace \
            --wait --timeout 10m

      - name: Verify
        run: |
          kubectl rollout status deployment/my-app -n my-app-prod
          kubectl get pods -n my-app-prod

      - name: Rollback on failure
        if: failure()
        run: helm rollback my-app -n my-app-prod
